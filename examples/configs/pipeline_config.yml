# Pipeline Configuration Example
# This file demonstrates the new unified pipeline configuration structure for ROMPY models.
# Use this file with CLI commands like: rompy pipeline --config pipeline_config.yml
#
# New structure:
# - config: ModelRun configuration (required)
# - backend: Backend configuration (optional, can be overridden with --backend-config)
# - postprocessor: Postprocessor configuration (optional, can be overridden with --processor-config)

# Example 1: Basic local pipeline
config:
  run_id: "example_pipeline_run"
  output_dir: "./simulations"
  delete_existing: true
  run_id_subdir: true

  # Time period for the model run
  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-03T00:00:00"
    interval: "1H"

  # Model configuration (example - replace with actual model config)
  config:
    model_type: "swan" # or other supported model types
    # Add model-specific configuration here

# Backend configuration
backend:
  type: local
  timeout: 7200 # 2 hours
  command: "python run_model.py"
  env_vars:
    OMP_NUM_THREADS: "4"
    MODEL_CONFIG: "production"

# Postprocessor configuration
postprocessor:
  type: noop # or other available processors
  # Add processor-specific parameters here

---
# Example 2: Docker-based pipeline
config:
  run_id: "docker_pipeline_run"
  output_dir: "./docker_simulations"
  delete_existing: true

  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-02T00:00:00"
    interval: "30M"

  config:
    model_type: "swan"

# Docker backend configuration
backend:
  type: docker
  image: "swan:latest"
  timeout: 10800 # 3 hours
  cpu: 8
  memory: "4g"
  mpiexec: "mpirun -np 8"
  volumes:
    - "./data:/app/data:rw"
    - "./results:/app/results:rw"
  env_vars:
    MODEL_THREADS: "8"
    MODEL_PARALLEL: "true"
    DATA_DIR: "/app/data"

postprocessor:
  type: noop

---
# Example 3: High-performance Docker pipeline with custom postprocessing
config:
  run_id: "multi_stage_pipeline"
  output_dir: "./multi_stage_output"
  delete_existing: true

  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-05T00:00:00"
    interval: "1H"

  config:
    model_type: "schism"

# HPC Docker backend configuration
backend:
  type: docker
  dockerfile: "./docker/Dockerfile.hpc"
  build_context: "./docker"
  build_args:
    MODEL_VERSION: "5.10.0"
    COMPILER: "intel"
  timeout: 86400 # 24 hours
  cpu: 32
  memory: "64g"
  mpiexec: "mpirun -np 32"
  user: "hpcuser"
  volumes:
    - "/scratch:/scratch:rw"
    - "/ocean_data:/data:ro"
    - "/results:/results:rw"
  env_vars:
    OMP_NUM_THREADS: "1"
    MODEL_PRECISION: "double"
    SLURM_NTASKS: "32"
    SCHISM_NPROC: "32"

# Custom postprocessor configuration
postprocessor:
  type: custom_analysis
  # Custom processor parameters
  analysis_type: "wave_statistics"
  output_format: "netcdf"
  generate_plots: true
  statistics_window: "24H"

---
# Example 4: Development/Testing pipeline
config:
  run_id: "test_pipeline"
  output_dir: "./test_output"
  delete_existing: true

  # Short period for testing
  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-01T06:00:00"
    interval: "1H"

  config:
    model_type: "swan"

# Fast local backend for testing
backend:
  type: local
  timeout: 1800 # 30 minutes
  command: "echo 'Test run' && python -m pytest tests/"
  capture_output: true
  env_vars:
    ENV: "testing"
    LOG_LEVEL: "DEBUG"

postprocessor:
  type: noop

---
# Example 5: Pipeline using YAML includes for composition
config:
  run_id: "modular_pipeline"
  output_dir: "./modular_output"
  delete_existing: true

  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-02T00:00:00"
    interval: "1H"

  # Include model config from external file
  config: !include ./model_configs/swan_config.yml

# Include backend config from external file
backend: !include ./backend_configs/docker_backend.yml

# Include postprocessor config from external file
postprocessor: !include ./processor_configs/ww3_transfer.yml

---
# Example 6: Minimal pipeline (backend and postprocessor optional)
# Backend and postprocessor can be omitted from config and provided via CLI flags
config:
  run_id: "minimal_pipeline"
  output_dir: "./minimal_output"
  delete_existing: true

  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-01T12:00:00"
    interval: "1H"

  config:
    model_type: "swan"

# No backend or postprocessor defined - must be provided via CLI:
# rompy pipeline --config this_file.yml --backend-config my_backend.yml --processor-config my_processor.yml
