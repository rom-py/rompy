# Complete pipeline configuration using only core rompy types
#
# Usage:
#   rompy pipeline examples/configs/basic_pipeline.yml
#
# Override either section from the CLI if needed:
#   rompy pipeline examples/configs/basic_pipeline.yml \
#     --backend-config examples/configs/local_backend.yml

# ModelRun configuration
config:
  run_id: "cli_test_backend_run"
  output_dir: "./output/cli_test"
  delete_existing: true
  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-02T00:00:00"
    interval: "1H"
  config:
    model_type: base

# Run backend configuration
backend:
  type: local
  timeout: 3600
  command: "ls -l"
  env_vars:
    MODEL_CONFIG: "example"
    LOG_LEVEL: "INFO"

# Postprocessor configuration
postprocessor:
  type: noop
  validate_outputs: true
