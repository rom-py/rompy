# Complete Pipeline Configuration for CLI Testing
# This demonstrates the new unified pipeline configuration structure
#
# Usage:
#   rompy pipeline --config basic_pipeline.yml
#
# Or with external configs:
#   rompy pipeline --config basic_pipeline.yml --backend-config my_backend.yml --processor-config my_processor.yml

# Model run configuration (required)
config:
  run_id: "cli_test_backend_run"
  output_dir: "./output/cli_test"
  delete_existing: true
  period:
    start: "2023-01-01T00:00:00"
    end: "2023-01-02T00:00:00"
    interval: "1H"
  # Add your model-specific configuration here
  # config:
  #   model_type: "swan"
  #   ...

# Backend configuration (optional - can be overridden with --backend-config)
backend:
  type: local
  timeout: 3600
  command: "echo 'Running basic model test'"
  env_vars:
    MODEL_TYPE: "test"
    ENVIRONMENT: "cli"

# Postprocessor configuration (optional - can be overridden with --processor-config)
postprocessor:
  type: noop